<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    
  <title>Frontend Meentor | Huddle landing page with single introductory section</title>
</head>
<body>
  <div class="huddle-logo">
    <img src="images/logo.svg" alt="Huddle" width="150" height="50">
  </div>
  <div class="content">
    <div class="illustrations">
      <img src="images/illustration-mockups.svg" alt="Illustration Mockups">
    </div>
    <div class="text-content">
      <h1>Build The Community Your Fans Will Love</h1>
      <p>Huddle re-imagines the way we build communities. You have a voice, but so does your audience. 
          Create connections with your users as you engage in genuine discussion.</p>
      <button>Register</button>
    </div>
  </div>
  <div class="social-icons-container">
    <i class="fa-brands fa-facebook"></i>
    <i class="fa-brands fa-twitter"></i>
    <i class="fa-brands fa-instagram"></i>
  </div>
</body>
</html>
